services:
  db:
    image: postgres:16-alpine
    container_name: goldlive-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gold_live
      POSTGRES_USER: gold_live_user
      POSTGRES_PASSWORD: Gl0ldDb_2025_Strong
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - goldlive_db:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: goldlive-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  goldlive_db:
